name: Run Tests

on:
  # push:
  #   branches:
  #     - main
  #     - staging
  #     - develop
  pull_request:
    branches:
      - develop

env:
  NODE_OPTIONS: '--max_old_space_size=8192'
  APP_NAME: 'nestjs-prisma-boilerplate'
  APP_ENV: 'test'
  APP_PORT: '5000'
  WORKER_PORT: '5001'

  USER_SECRET: 'USER_SECRET'
  USER_REFRESH_SECRET: 'USER_REFRESH_SECRET'
  USER_TOKEN_EXPIRE_IN: '1d'
  USER_REFRESH_TOKEN_EXPIRE_IN: '7d'

  ADMIN_SECRET: 'ADMIN_SECRET'
  ADMIN_REFRESH_SECRET: 'ADMIN_REFRESH_SECRET'
  ADMIN_TOKEN_EXPIRE_IN: '15m'
  ADMIN_REFRESH_TOKEN_EXPIRE_IN: '7d'

  DATABASE_URL: 'mongodb://mongodb:27017/nestjs-prisma-boilerplate'

  CACHE_MODE: 'redis'
  CACHE_TTL: '3600'

  USE_QUEUE: 'true'

  REDIS_MODE: 'single'
  REDIS_URL: 'redis://redis:6379'

  LOGGER_TYPE: 'winston'
  LOGGER_MAX_FILES: '30d'
  LOGGER_LEVEL: 'warn'
  LOGGER_DATABASE_URL: 'mongodb://mongodb:27017/nestjs-prisma-boilerplate'

  SWAGGER_TITLE: 'NestJS Prisma Boilerplate'
  SWAGGER_DESCRIPTION: 'NestJS Prisma Boilerplate'
  SWAGGER_VERSION: '1.0.0'
  SWAGGER_FAVICON: 'https://nestjs.com/img/logo-small.svg'
  SWAGGER_ENDPOINT: '/swagger'

  UPLOAD_PATH: 'uploads'
  BODY_SIZE: '10mb'

jobs:
  test:
    runs-on: ubuntu-latest
    container: node:iron-alpine
    services:
      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongodb:
        image: mongo:7
        options: >-
          --health-cmd "mongo --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./src

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/yarn
            ${{ github.workspace }}/node_modules
          key: ${{ runner.os }}-cb-backend-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-cb-backend-

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run prisma:generate
        run: yarn prisma:generate

      - name: Run lint
        run: yarn lint

      - name: Run unit tests
        run: yarn test

      - name: Run e2e tests
        run: yarn test:e2e

      - name: Run build
        run: yarn build
